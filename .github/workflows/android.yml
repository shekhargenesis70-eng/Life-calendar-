name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Create project files
        run: |
          mkdir -p app/src/main/java/com/lifecalendar
          mkdir -p app/src/main/res/{layout,values,xml,mipmap-hdpi,mipmap-xhdpi,mipmap-xxhdpi}

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "LifeCalendar"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.1.4' apply false
          }
          EOF

          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.lifecalendar'
              compileSdk 34
              defaultConfig {
                  applicationId "com.lifecalendar"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SET_WALLPAPER" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.LifeCalendar">
                  <activity android:name=".MainActivity" android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service android:name=".LifeCalendarWallpaperService"
                      android:enabled="true" android:exported="true"
                      android:label="@string/app_name"
                      android:permission="android.permission.BIND_WALLPAPER">
                      <intent-filter>
                          <action android:name="android.service.wallpaper.WallpaperService" />
                      </intent-filter>
                      <meta-data android:name="android.service.wallpaper"
                          android:resource="@xml/wallpaper" />
                  </service>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Life Calendar</string>
              <string name="wallpaper_desc">Dot grid live wallpaper</string>
          </resources>
          EOF

          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.LifeCalendar" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">#ff4f6d</item>
                  <item name="colorOnPrimary">#ffffff</item>
                  <item name="android:windowBackground">#0a0a0a</item>
                  <item name="android:statusBarColor">#0a0a0a</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/xml/wallpaper.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <wallpaper xmlns:android="http://schemas.android.com/apk/res/android"
              android:label="Life Calendar"
              android:description="@string/wallpaper_desc"
              android:thumbnail="@mipmap/ic_launcher" />
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#0a0a0a">
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:orientation="vertical" android:padding="24dp">
                  <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:text="Life Calendar" android:textColor="#ffffff"
                      android:textSize="30sp" android:textStyle="bold"
                      android:gravity="center" android:layout_marginTop="20dp"/>
                  <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:text="Your days as dots" android:textColor="#666666"
                      android:textSize="13sp" android:gravity="center" android:layout_marginBottom="28dp"/>
                  <com.google.android.material.tabs.TabLayout android:id="@+id/tabLayout"
                      android:layout_width="match_parent" android:layout_height="48dp"
                      android:background="#161616" app:tabTextColor="#666666"
                      app:tabSelectedTextColor="#ffffff" app:tabIndicatorColor="#ff4f6d"
                      android:layout_marginBottom="24dp">
                      <com.google.android.material.tabs.TabItem android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Year"/>
                      <com.google.android.material.tabs.TabItem android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Love"/>
                      <com.google.android.material.tabs.TabItem android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Goal"/>
                  </com.google.android.material.tabs.TabLayout>
                  <TextView android:id="@+id/tvMode" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:textColor="#ff4f6d"
                      android:textSize="14sp" android:gravity="center" android:layout_marginBottom="20dp"/>
                  <TextView android:id="@+id/tvStartDate" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:textColor="#aaaaaa"
                      android:textSize="14sp" android:background="#161616"
                      android:padding="14dp" android:layout_marginBottom="10dp"/>
                  <Button android:id="@+id/btnPickStart" android:layout_width="match_parent"
                      android:layout_height="52dp" android:text="Pick Start Date"
                      android:textColor="#ffffff" android:backgroundTint="#ff4f6d"
                      android:layout_marginBottom="12dp"/>
                  <TextView android:id="@+id/tvEndDate" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:textColor="#aaaaaa"
                      android:textSize="14sp" android:background="#161616"
                      android:padding="14dp" android:layout_marginBottom="10dp"/>
                  <Button android:id="@+id/btnPickEnd" android:layout_width="match_parent"
                      android:layout_height="52dp" android:text="Pick End Date"
                      android:textColor="#ffffff" android:backgroundTint="#333333"
                      android:layout_marginBottom="28dp"/>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:orientation="horizontal" android:layout_marginBottom="12dp">
                      <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content"
                          android:layout_weight="1" android:orientation="vertical" android:gravity="center"
                          android:background="#161616" android:padding="16dp" android:layout_marginEnd="6dp">
                          <TextView android:id="@+id/tvDaysDone" android:layout_width="wrap_content"
                              android:layout_height="wrap_content" android:text="0"
                              android:textColor="#ff4f6d" android:textSize="26sp" android:textStyle="bold"/>
                          <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                              android:text="DONE" android:textColor="#666666" android:textSize="10sp"/>
                      </LinearLayout>
                      <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content"
                          android:layout_weight="1" android:orientation="vertical" android:gravity="center"
                          android:background="#161616" android:padding="16dp" android:layout_marginEnd="6dp">
                          <TextView android:id="@+id/tvDaysLeft" android:layout_width="wrap_content"
                              android:layout_height="wrap_content" android:text="365"
                              android:textColor="#ff4f6d" android:textSize="26sp" android:textStyle="bold"/>
                          <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                              android:text="LEFT" android:textColor="#666666" android:textSize="10sp"/>
                      </LinearLayout>
                      <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content"
                          android:layout_weight="1" android:orientation="vertical" android:gravity="center"
                          android:background="#161616" android:padding="16dp">
                          <TextView android:id="@+id/tvPercent" android:layout_width="wrap_content"
                              android:layout_height="wrap_content" android:text="0%"
                              android:textColor="#ff4f6d" android:textSize="26sp" android:textStyle="bold"/>
                          <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                              android:text="%" android:textColor="#666666" android:textSize="10sp"/>
                      </LinearLayout>
                  </LinearLayout>
                  <TextView android:id="@+id/tvMilestone" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:background="#1a0a0e"
                      android:padding="14dp" android:textColor="#ff8fa3" android:textSize="13sp"
                      android:gravity="center" android:layout_marginBottom="28dp"/>
                  <Button android:id="@+id/btnSetWallpaper" android:layout_width="match_parent"
                      android:layout_height="60dp" android:text="SET AS LIVE WALLPAPER"
                      android:textColor="#ffffff" android:textSize="15sp" android:textStyle="bold"
                      android:backgroundTint="#ff4f6d" android:layout_marginBottom="32dp"/>
              </LinearLayout>
          </ScrollView>
          EOF

          cat > app/src/main/java/com/lifecalendar/MainActivity.java << 'EOF'
          package com.lifecalendar;
          import android.app.WallpaperManager;
          import android.content.ComponentName;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.view.View;
          import android.widget.Button;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import com.google.android.material.datepicker.MaterialDatePicker;
          import com.google.android.material.tabs.TabLayout;
          import java.text.SimpleDateFormat;
          import java.util.Calendar;
          import java.util.Date;
          import java.util.Locale;
          import java.util.TimeZone;
          public class MainActivity extends AppCompatActivity {
              SharedPreferences prefs;
              TextView tvStartDate,tvEndDate,tvDaysDone,tvDaysLeft,tvPercent,tvMilestone,tvMode;
              Button btnPickStart,btnPickEnd,btnSetWallpaper;
              TabLayout tabLayout;
              long startMillis=0,endMillis=0;
              String currentMode="year";
              @Override protected void onCreate(Bundle s) {
                  super.onCreate(s); setContentView(R.layout.activity_main);
                  prefs=getSharedPreferences("LifeCalPrefs",MODE_PRIVATE);
                  tvStartDate=findViewById(R.id.tvStartDate); tvEndDate=findViewById(R.id.tvEndDate);
                  tvDaysDone=findViewById(R.id.tvDaysDone); tvDaysLeft=findViewById(R.id.tvDaysLeft);
                  tvPercent=findViewById(R.id.tvPercent); tvMilestone=findViewById(R.id.tvMilestone);
                  tvMode=findViewById(R.id.tvMode); btnPickStart=findViewById(R.id.btnPickStart);
                  btnPickEnd=findViewById(R.id.btnPickEnd); btnSetWallpaper=findViewById(R.id.btnSetWallpaper);
                  tabLayout=findViewById(R.id.tabLayout);
                  startMillis=prefs.getLong("startMillis",0); endMillis=prefs.getLong("endMillis",0);
                  currentMode=prefs.getString("mode","year");
                  updateUI();
                  tabLayout.addOnTabSelectedListener(new TabLayout.OnTabSelectedListener(){
                      @Override public void onTabSelected(TabLayout.Tab tab){
                          switch(tab.getPosition()){case 0:currentMode="year";break;case 1:currentMode="love";break;case 2:currentMode="goal";break;}
                          prefs.edit().putString("mode",currentMode).apply(); updateUI();
                      }
                      @Override public void onTabUnselected(TabLayout.Tab t){}
                      @Override public void onTabReselected(TabLayout.Tab t){}
                  });
                  int ti=currentMode.equals("year")?0:currentMode.equals("love")?1:2;
                  if(tabLayout.getTabAt(ti)!=null) tabLayout.getTabAt(ti).select();
                  btnPickStart.setOnClickListener(v->pickDate(true));
                  btnPickEnd.setOnClickListener(v->pickDate(false));
                  btnSetWallpaper.setOnClickListener(v->setWallpaper());
              }
              void pickDate(boolean isStart){
                  MaterialDatePicker<Long> p=MaterialDatePicker.Builder.datePicker()
                      .setTitleText(isStart?"Pick Start Date":"Pick End Date")
                      .setSelection(isStart?(startMillis>0?startMillis:MaterialDatePicker.todayInUtcMilliseconds()):(endMillis>0?endMillis:MaterialDatePicker.todayInUtcMilliseconds()))
                      .build();
                  p.addOnPositiveButtonClickListener(sel->{
                      if(isStart){startMillis=sel;prefs.edit().putLong("startMillis",sel).apply();}
                      else{endMillis=sel;prefs.edit().putLong("endMillis",sel).apply();}
                      updateUI();
                  });
                  p.show(getSupportFragmentManager(),"DP");
              }
              void updateUI(){
                  SimpleDateFormat sdf=new SimpleDateFormat("dd MMM yyyy",Locale.getDefault());
                  boolean show=!currentMode.equals("year");
                  btnPickStart.setVisibility(show?View.VISIBLE:View.GONE);
                  btnPickEnd.setVisibility(show?View.VISIBLE:View.GONE);
                  tvStartDate.setVisibility(show?View.VISIBLE:View.GONE);
                  tvEndDate.setVisibility(show?View.VISIBLE:View.GONE);
                  if(currentMode.equals("year")){tvMode.setText("Tracking current year");}
                  else{
                      tvMode.setText(currentMode.equals("love")?"Love countdown":"Goal tracker");
                      tvStartDate.setText(startMillis>0?"From: "+sdf.format(new Date(startMillis)):"From: not set");
                      tvEndDate.setText(endMillis>0?"To: "+sdf.format(new Date(endMillis)):"To: not set");
                  }
                  Calendar today=Calendar.getInstance();
                  today.set(Calendar.HOUR_OF_DAY,0);today.set(Calendar.MINUTE,0);today.set(Calendar.SECOND,0);today.set(Calendar.MILLISECOND,0);
                  int total,done;
                  if(currentMode.equals("year")){total=today.getActualMaximum(Calendar.DAY_OF_YEAR);done=today.get(Calendar.DAY_OF_YEAR)-1;}
                  else if(startMillis==0){tvDaysDone.setText("0");tvDaysLeft.setText("0");tvPercent.setText("0%");tvMilestone.setText("Set dates above");return;}
                  else{
                      Calendar s=Calendar.getInstance(TimeZone.getTimeZone("UTC"));s.setTimeInMillis(startMillis);
                      Calendar e=Calendar.getInstance(TimeZone.getTimeZone("UTC"));e.setTimeInMillis(endMillis>0?endMillis:startMillis+365L*86400000L);
                      total=(int)((e.getTimeInMillis()-s.getTimeInMillis())/86400000L)+1;
                      done=Math.max(0,Math.min((int)((today.getTimeInMillis()-s.getTimeInMillis())/86400000L),total));
                  }
                  int left=total-done,pct=total>0?(int)(done*100.0/total):0;
                  tvDaysDone.setText(String.valueOf(done));tvDaysLeft.setText(String.valueOf(left));tvPercent.setText(pct+"%");
                  if(currentMode.equals("love")&&startMillis>0){
                      int[]ms={100,200,365,500,1000,2000,5000};String m="Forever and beyond";
                      for(int mil:ms){if(mil>done){m="Next: "+mil+" days ("+(mil-done)+" to go)";break;}}
                      tvMilestone.setText(m);
                  }else{tvMilestone.setText(left+" days remaining");}
              }
              void setWallpaper(){
                  try{Intent i=new Intent(WallpaperManager.ACTION_CHANGE_LIVE_WALLPAPER);
                      i.putExtra(WallpaperManager.EXTRA_LIVE_WALLPAPER_COMPONENT,new ComponentName(this,LifeCalendarWallpaperService.class));startActivity(i);}
                  catch(Exception e){Toast.makeText(this,"Home > Wallpapers > Live Wallpapers > Life Calendar",Toast.LENGTH_LONG).show();}
              }
          }
          EOF

          cat > app/src/main/java/com/lifecalendar/LifeCalendarWallpaperService.java << 'EOF'
          package com.lifecalendar;
          import android.content.SharedPreferences;
          import android.graphics.Canvas;
          import android.graphics.Color;
          import android.graphics.Paint;
          - name: Build APK
        run: gradle assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: LifeCalendar-APK
          path: app/build/outputs/apk/debug/app-debug.apk
                - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: LifeCalendar-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          
