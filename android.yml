          python3 << 'PYEOF'
          from PIL import Image, ImageDraw
          sizes={'hdpi':72,'xhdpi':96,'xxhdpi':144}
          for d,s in sizes.items():
              img=Image.new('RGBA',(s,s),(10,10,10,255))
              draw=ImageDraw.Draw(img)
              cols=6;margin=s*0.1;sp=(s-2*margin)/cols;r=sp*0.3
              for row in range(6):
                  for col in range(6):
                      cx=margin+col*sp+sp/2;cy=margin+row*sp+sp/2;idx=row*6+col
                      color=(255,79,109,255) if idx==16 else ((255,255,255,220) if idx<16 else (42,42,42,255))
                      draw.ellipse([cx-r,cy-r,cx+r,cy+r],fill=color)
              p=f'app/src/main/res/mipmap-{d}/'
              img.save(p+'ic_launcher.png');img.save(p+'ic_launcher_round.png')
          PYEOF

